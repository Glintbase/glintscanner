name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mcp-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'  # Changed from '20'
          cache: 'npm'
          cache-dependency-path: mcp/package-lock.json
      - run: npm ci
      - run: npm test

  cli-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'  # Changed from '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json
      - run: npm ci
      - run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'  # Changed from '20'
      - name: Build MCP
        working-directory: mcp
        run: |
          npm ci
          npm run build
      - name: Build CLI
        working-directory: cli
        run: |
          npm ci
          npm run build
      - name: Verify MCP binary
        working-directory: mcp
        run: node dist/index.js --help || true
      - name: Verify CLI binary
        working-directory: cli
        run: node dist/index.js --help
